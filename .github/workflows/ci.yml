name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (type-check + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run vite:build
      - run: npx tsc --noEmit
      - run: npm test

  sidecar:
    name: Sidecar (build + IPC smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: node scripts/build-sidecar.mjs
      - name: Smoke test IPC
        run: |
          output=$(echo '{"id":1,"method":"getStatus"}' | node sidecar/dist/sidecar.mjs 2>/dev/null | head -2)
          echo "$output"
          echo "$output" | grep -q '"event":"ready"' || (echo "ready event missing" && exit 1)
          echo "$output" | grep -q '"sidecarVersion"' || (echo "getStatus response missing" && exit 1)

  rust:
    name: Rust (cargo check)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build sidecar (required before cargo build)
        run: node scripts/build-sidecar.mjs
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked
      - name: Cargo test
        if: matrix.os == 'ubuntu-latest'
        working-directory: src-tauri
        run: cargo test --lib --locked
