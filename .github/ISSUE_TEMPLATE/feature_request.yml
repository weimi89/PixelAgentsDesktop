name: ✨ 功能請求
description: 提議新功能或改進
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 您希望解決什麼問題？
      description: 描述使用情境與目前遇到的痛點
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建議的解法
      description: 您理想中的功能應該如何運作
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考慮過的替代方案

  - type: textarea
    id: context
    attributes:
      label: 其他資訊
      description: 截圖、參考連結等
