version: 2
updates:
  # npm (frontend + sidecar)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns: ["@tauri-apps/*", "tauri-*"]
      testing:
        patterns: ["vitest", "@testing-library/*", "happy-dom"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Rust
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns: ["tauri*"]
      serde:
        patterns: ["serde*"]
      tokio:
        patterns: ["tokio*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
